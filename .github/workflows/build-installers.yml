name: Build ActivePulse Installers

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 1.0.1). Leave blank to use pom.xml version.'
        required: false
        default: ''

env:
  APP_NAME: ActivePulse
  APP_VENDOR: Aress Software
  APP_DESCRIPTION: "ActivePulse Background Agent"
  APP_COPYRIGHT: "Copyright (c) 2026 Aress Software"
  MAIN_CLASS: com.activepulse.agent.Main
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:

  build-jar:
    name: Build Fat JAR
    runs-on: ubuntu-22.04
    outputs:
      app_version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_version }}" ]]; then
            VERSION="${{ github.event.inputs.release_version }}"
            echo "Using manual input version: $VERSION"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Using tag version: $VERSION"
          else
            VERSION=$(grep -m1 '<version>' pom.xml | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/' | tr -d ' ')
            echo "Using pom.xml version: $VERSION"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "::error::Could not determine version"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Final version: $VERSION"

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: activepulse-jar
          path: target/*.jar
          retention-days: 1

  build-windows:
    name: Windows Installer (.msi)
    needs: build-jar
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: activepulse-jar
          path: target

      - name: Prepare input dir
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path input | Out-Null
          Copy-Item target/*.jar -Destination input/

      - name: Build .msi
        shell: pwsh
        env:
          APP_VERSION: ${{ needs.build-jar.outputs.app_version }}
        run: |
          $iv = ($env:APP_VERSION -replace '-SNAPSHOT.*','') -replace '[^0-9.]',''
          if ([string]::IsNullOrWhiteSpace($iv)) {
            Write-Error "Could not derive installer version"
            exit 1
          }
          $mainJar = (Get-ChildItem input/*.jar | Select-Object -First 1).Name

          # Notice: --win-dir-chooser REMOVED (was causing wizard prompts during silent install).
          # --arguments "--watchdog" bakes watchdog mode into the launcher.
          jpackage `
            --type msi `
            --name "${{ env.APP_NAME }}" `
            --app-version $iv `
            --vendor "${{ env.APP_VENDOR }}" `
            --description "${{ env.APP_DESCRIPTION }}" `
            --copyright "${{ env.APP_COPYRIGHT }}" `
            --icon src/main/resources/tray-icon.ico `
            --input input `
            --main-jar $mainJar `
            --main-class "${{ env.MAIN_CLASS }}" `
            --arguments "--watchdog" `
            --dest dist `
            --win-menu `
            --win-menu-group "${{ env.APP_VENDOR }}" `
            --win-shortcut `
            --win-upgrade-uuid "8f3e4b2a-9d12-4c5f-a6b7-1e2d3c4b5a6f" `
            --java-options "-Xms64m" `
            --java-options "-Xmx256m"

          $msi = Get-ChildItem dist/*.msi | Select-Object -First 1
          Write-Host "Produced: $($msi.Name) ($([math]::Round($msi.Length/1MB,2)) MB)"
          Write-Host ""
          Write-Host "=== SILENT INSTALL COMMAND (use on target machines) ==="
          Write-Host "msiexec /i `"$($msi.Name)`" /quiet /norestart REBOOT=ReallySuppress /l*v `"%TEMP%\activepulse_install.log`""

      - uses: actions/upload-artifact@v4
        with:
          name: ActivePulse-Windows-x64
          path: dist/*.msi
          retention-days: 30

  build-linux:
    name: Linux Installer (.deb)
    needs: build-jar
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y fakeroot

      - uses: actions/download-artifact@v4
        with:
          name: activepulse-jar
          path: target

      - run: |
          mkdir -p input
          cp target/*.jar input/

      - name: Build .deb
        env:
          APP_VERSION: ${{ needs.build-jar.outputs.app_version }}
        run: |
          IV=$(echo "$APP_VERSION" | sed 's/-SNAPSHOT.*//' | sed 's/[^0-9.]//g')
          [ -z "$IV" ] && IV="1.0.0"
          MAIN_JAR=$(ls input/*.jar | head -n 1 | xargs -n1 basename)
          jpackage \
            --type deb \
            --name "${APP_NAME}" \
            --app-version "$IV" \
            --vendor "${APP_VENDOR}" \
            --description "${APP_DESCRIPTION}" \
            --copyright "${APP_COPYRIGHT}" \
            --icon src/main/resources/tray-icon.png \
            --input input \
            --main-jar "$MAIN_JAR" \
            --main-class "${MAIN_CLASS}" \
            --arguments "--watchdog" \
            --dest dist \
            --linux-package-name activepulse \
            --linux-shortcut \
            --linux-menu-group "Utility" \
            --java-options "-Xms64m" \
            --java-options "-Xmx256m"

      - uses: actions/upload-artifact@v4
        with:
          name: ActivePulse-Linux-x64
          path: dist/*.deb
          retention-days: 30

  build-macos-intel:
    name: macOS Intel Installer (.dmg)
    needs: build-jar
    if: github.event_name != 'pull_request'
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          architecture: x64

      - uses: actions/download-artifact@v4
        with:
          name: activepulse-jar
          path: target

      - run: |
          mkdir -p input
          cp target/*.jar input/

      - name: Build .dmg
        env:
          APP_VERSION: ${{ needs.build-jar.outputs.app_version }}
        run: |
          IV=$(echo "$APP_VERSION" | sed 's/-SNAPSHOT.*//' | sed 's/[^0-9.]//g')
          [ -z "$IV" ] && IV="1.0.0"
          MAIN_JAR=$(ls input/*.jar | head -n 1 | xargs -n1 basename)
          jpackage \
            --type dmg \
            --name "${APP_NAME}" \
            --app-version "$IV" \
            --vendor "${APP_VENDOR}" \
            --description "${APP_DESCRIPTION}" \
            --copyright "${APP_COPYRIGHT}" \
            --icon src/main/resources/tray-icon.icns \
            --input input \
            --main-jar "$MAIN_JAR" \
            --main-class "${MAIN_CLASS}" \
            --arguments "--watchdog" \
            --dest dist \
            --mac-package-name "ActivePulse" \
            --java-options "-Xms64m" \
            --java-options "-Xmx256m"
          for f in dist/*.dmg; do mv "$f" "${f%.dmg}-Intel.dmg"; done

      - uses: actions/upload-artifact@v4
        with:
          name: ActivePulse-macOS-Intel
          path: dist/*.dmg
          retention-days: 30

  build-macos-arm:
    name: macOS Apple Silicon Installer (.dmg)
    needs: build-jar
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          architecture: aarch64

      - uses: actions/download-artifact@v4
        with:
          name: activepulse-jar
          path: target

      - run: |
          mkdir -p input
          cp target/*.jar input/

      - name: Build .dmg
        env:
          APP_VERSION: ${{ needs.build-jar.outputs.app_version }}
        run: |
          IV=$(echo "$APP_VERSION" | sed 's/-SNAPSHOT.*//' | sed 's/[^0-9.]//g')
          [ -z "$IV" ] && IV="1.0.0"
          MAIN_JAR=$(ls input/*.jar | head -n 1 | xargs -n1 basename)
          jpackage \
            --type dmg \
            --name "${APP_NAME}" \
            --app-version "$IV" \
            --vendor "${APP_VENDOR}" \
            --description "${APP_DESCRIPTION}" \
            --copyright "${APP_COPYRIGHT}" \
            --icon src/main/resources/tray-icon.icns \
            --input input \
            --main-jar "$MAIN_JAR" \
            --main-class "${MAIN_CLASS}" \
            --arguments "--watchdog" \
            --dest dist \
            --mac-package-name "ActivePulse" \
            --java-options "-Xms64m" \
            --java-options "-Xmx256m"
          for f in dist/*.dmg; do mv "$f" "${f%.dmg}-AppleSilicon.dmg"; done

      - uses: actions/upload-artifact@v4
        with:
          name: ActivePulse-macOS-AppleSilicon
          path: dist/*.dmg
          retention-days: 30

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-macos-intel, build-macos-arm]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: installers
      - run: |
          mkdir -p release
          find installers -type f \( -name "*.msi" -o -name "*.deb" -o -name "*.dmg" \) -exec cp {} release/ \;
          ls -la release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false



